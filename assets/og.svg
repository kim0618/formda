<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Pretendard, 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#eef2ff"/>
      <stop offset="0.55" stop-color="#f1f3fc"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#1a1a2e" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- 장식 원 -->
  <circle cx="1090" cy="70" r="190" fill="#4f46e5" opacity="0.06"/>
  <circle cx="120" cy="600" r="150" fill="#4f46e5" opacity="0.05"/>

  <!-- 좌측 텍스트 -->
  <text x="84" y="150" font-size="40" font-weight="800" fill="#4f46e5" letter-spacing="-1">폼다</text>
  <text x="82" y="270" font-size="62" font-weight="800" fill="#1a1a2e" letter-spacing="-1.5">가입 없이,</text>
  <text x="82" y="350" font-size="62" font-weight="800" fill="#1a1a2e" letter-spacing="-1.5">문서 PDF를 바로</text>
  <text x="84" y="412" font-size="27" font-weight="500" fill="#4b5563">견적서 · 이력서 · 차용증 등 20종 · 무료</text>

  <!-- 칩 -->
  <g font-size="22" font-weight="600" fill="#4338ca" text-anchor="middle">
    <rect x="84" y="452" width="176" height="50" rx="25" fill="#fff" stroke="#dfe3f5"/>
    <text x="172" y="484">서버 저장 없음</text>
    <rect x="276" y="452" width="126" height="50" rx="25" fill="#fff" stroke="#dfe3f5"/>
    <text x="339" y="484">1분 작성</text>
    <rect x="418" y="452" width="150" height="50" rx="25" fill="#fff" stroke="#dfe3f5"/>
    <text x="493" y="484">PDF · PNG</text>
  </g>

  <text x="84" y="572" font-size="26" font-weight="700" fill="#4f46e5">formda.kr</text>

  <!-- 우측 A4 문서 미리보기 (견적서) -->
  <g transform="rotate(4 920 315)" filter="url(#cardShadow)">
    <rect x="742" y="96" width="356" height="446" rx="10" fill="#ffffff"/>
    <rect x="742" y="96" width="356" height="6" rx="3" fill="#4f46e5"/>
    <text x="920" y="156" font-size="24" font-weight="800" fill="#1a1a2e" text-anchor="middle" letter-spacing="6">견 적 서</text>
    <line x1="770" y1="176" x2="1070" y2="176" stroke="#1a1a2e" stroke-width="2"/>
    <!-- 메타 -->
    <rect x="770" y="192" width="120" height="9" rx="4" fill="#e5e7f2"/>
    <rect x="980" y="192" width="90" height="9" rx="4" fill="#e5e7f2"/>
    <!-- 공급자 박스 -->
    <rect x="770" y="218" width="300" height="78" rx="4" fill="#f7f8fa" stroke="#e5e7f2"/>
    <rect x="786" y="234" width="150" height="8" rx="4" fill="#d8dcec"/>
    <rect x="786" y="252" width="190" height="8" rx="4" fill="#e5e7f2"/>
    <rect x="786" y="270" width="120" height="8" rx="4" fill="#e5e7f2"/>
    <!-- 합계 강조 -->
    <rect x="770" y="312" width="300" height="40" rx="4" fill="#eef2ff" stroke="#c7cef5"/>
    <text x="786" y="338" font-size="15" font-weight="700" fill="#4338ca">합계금액</text>
    <text x="1054" y="338" font-size="16" font-weight="800" fill="#1a1a2e" text-anchor="end">3,630,000</text>
    <!-- 품목 표 라인 -->
    <g fill="#eef0f6">
      <rect x="770" y="368" width="300" height="9" rx="3"/>
      <rect x="770" y="388" width="300" height="9" rx="3"/>
      <rect x="770" y="408" width="300" height="9" rx="3"/>
      <rect x="770" y="428" width="220" height="9" rx="3"/>
    </g>
  </g>
</svg>
